// ╔════════════════════════════════════════════════════════════╗
// ║  Autoexec.cfg — Kepler's CS2 Autoexec                        ║
// ║  Launch option:  +exec Autoexec                              ║
// ╚════════════════════════════════════════════════════════════╝
// ── General ─────────────────────────────────────────────────

unbindall						// Limpia cualquier bind previo
autobuy "0"						// No autocomprar al iniciar ronda
bind "mouse_x" "yaw"					// Mapeo de eje x del mouse a rotacion de camara
bind "mouse_y" "pitch"					// Mapeo de eje y del mouse a rotacion de camara
engine_low_latency_sleep_after_client_tick "1"		// Reduce microstutter (low latency mode)
m_pitch "0.022"						// Sensibilidad vertical a nivel de motor
m_yaw "0.01863"						// Sensibilidad horizontal a nivel de motor
net_client_steamdatagram_enable_override "1" 		// Forzar routing via red SDR de Steam
net_maxroutable "1200"					// Tamano max. de paquete (reduce fragmentacion)
r_show_build_info "0"					// Sin info de build en pantalla
sv_showimpacts "0"					// Sin marcas de impacto (estado base, prac.cfg lo activa)

// ──────────────────────────────────────────────────────────────
// NOTA SOBRE TECLAS vs SCANCODES — cambio de idioma ENG US/ENG LAA
//
// Este archivo usa nombres de tecla genericos ("ctrl", "shift")
// en vez de scancodes. En Source 2 estos nombres genericos
// representan tanto la tecla izquierda como la derecha.
//
// Movimiento usa:
//   bind "shift" "+sprint"   (caminar/correr)
//   bind "ctrl"  "+duck"     (agacharse)
//
// Presionar sprint+duck a la vez = Ctrl+Shift simultaneo, que es
// el atajo POR DEFECTO de Windows para cambiar el idioma del
// teclado (ENG US <-> ENG LAA). Esto puede pasar constantemente
// al jugar (correr agachado es un movimiento muy comun).
//
// SOLUCION (en Windows, no en este archivo):
//   Configuracion > Hora e idioma > Escritura >
//   Configuracion avanzada del teclado >
//   Metodos de acceso directo para idiomas de entrada >
//   "Cambiar idioma de entrada" = No asignado.
//
// Esto elimina el cambio de idioma sin afectar ningun bind.
// ──────────────────────────────────────────────────────────────

echo "[VAC] cargando configuracion base..."

// ╔════════════════════════════════════════════════════════════╗
// ║  AUDIO                                                       ║
// ╚════════════════════════════════════════════════════════════╝
// ── Audio ───────────────────────────────────────────────────

volume "1"						// Volumen maestro
snd_menumap_volume "0"					// Sin musica de fondo en el menu principal
sound_device_override "Source2SDLDefaultDevice"		// Dispositivo de salida
snd_headphone_eq "1"					// Perfil de ecualizacion = Crisp (audifonos)
snd_spatialize_lerp "0.8"				// Aislamiento L/R (80%) — suavizado de audio 3D
snd_steamaudio_enable_perspective_correction "1"	// Correccion de perspectiva (Steam Audio)
snd_mute_losefocus "0"					// No silenciar al perder foco la ventana (reproduce en 2do plano)

// ── Voz ─────────────────────────────────────────────────────

snd_voipvolume "1"					// Volumen de voz de otros jugadores
voice_modenable "1"					// Voz habilitada (push to talk)
voice_device_override "Microphone (High Definition Audio Device)" // Dispositivo de entrada
voice_loopback "0"					// No escuchar tu propia voz
voice_always_sample_mic "0"				// No samplear el mic constantemente (streamlined PTT = no)
voice_threshold "-120"					// Umbral de activacion del mic (dB)

// ── Musica y sonidos de evento ────────────────────────────────

snd_menumusic_volume "0"				// Musica del menu principal
snd_roundstart_volume "0"				// Sonido al iniciar ronda
snd_roundaction_volume "0"				// Sonido de accion de ronda
snd_roundend_volume "0"					// Sonido al terminar ronda
snd_mvp_volume "0"					// Musica MVP
snd_mapobjective_volume "0"				// Sonido de bomba/rehenes
snd_tensecondwarning_volume "0.3"			// Aviso de 10 segundos (30%)
snd_deathcamera_volume "0"				// Sonido de camara de muerte
snd_mute_mvp_music_live_players "0"			// No silenciar musica MVP si hay jugadores vivos en ambos equipos

// ╔════════════════════════════════════════════════════════════╗
// ║  JUEGO                                                       ║
// ╚════════════════════════════════════════════════════════════╝
// ── Juego ───────────────────────────────────────────────────

con_enable "1"						// Habilita la consola
mm_dedicated_search_maxping "40"			// Ping maximo aceptado al buscar partida
rate "786432"						// Ancho de banda maximo (786432 = trafico sin restriccion)
cl_net_buffer_ticks "0"					// Sin buffer extra de red (menor latencia, sin suavizado de jitter)
install_dlc_workshoptools_cvar "0"			// No instalar herramientas de Workshop

// ── HUD ───────────────────────────────────────────────────────

hud_scaling "1"						// Escala general del HUD
cl_hud_color "2"					// Color del HUD = Bright White
cl_teamcounter_playercount_instead_of_avatars "0"	// Conteo grande de jugadores = NO (mostrar avatares)
ui_steam_overlay_notification_position "bottomleft"	// Posicion de notificaciones de Steam
ui_steam_overlay_notification_position_horz "0"		// Offset horizontal de notificaciones
ui_steam_overlay_notification_position_vert "0"		// Offset vertical de notificaciones
cl_weapon_selection_rarity_color "0"			// Brillo de arma segun rareza = NO
cl_force_spec_hud_color_to_team "0"			// Sobreescribir color de HUD al espectar = NO

// ── Equipo ──────────────────────────────────────────────────

cl_teamid_overhead_mode "3"				// Mostrar sobre companeros: pips, nombres, vida y equipo
cl_teammate_colors_show "1"				// Mostrar colores de jugador en competitivo
cl_teamid_overhead_colors_show "1"			// Usar esos colores en el indicador sobre companeros
lobby_default_privacy_bits2 "1"				// Permiso por defecto del lobby = todos los amigos pueden unirse
ui_setting_advertiseForhire_auto "0"			// No anunciar "buscando equipo" al iniciar CS2

// ── Comunicación ────────────────────────────────────────────

cl_player_ping_mute "1"					// Pings de jugadores: mostrar sin sonido
cl_mute_enemy_team "0"					// No silenciar voz del equipo enemigo
cl_mute_all_but_friends_and_party "0"			// No silenciar a todos salvo amigos/party
cl_allow_animated_avatars "0"				// Avatares animados desactivados
cl_hide_avatar_images "2"				// Mostrar imagenes de avatar solo de amigos
cl_sanitize_player_names "0"				// No "limpiar" nombres raros de jugadores

// ── Espectador / Marcador ───────────────────────────────────

spec_usenumberkeys_nobinds "1"				// Numeros cambian de espectador/vota mapa sin pisar binds
cl_scoreboard_mouse_enable_binding "+attack2"		// Tecla para usar el mouse en el marcador = click derecho
eom_local_player_defeat_anim_enabled "1"		// Animacion de derrota al final del partido
cl_scoreboard_survivors_always_on "0"			// Supervivientes siempre visibles = NO
cl_obs_interp_enable "0"				// Camara de espectador suavizada = NO
cl_obs_interp_speed "0.25"				// Velocidad de suavizado de camara de espectador (si se activa)

// ── Item ────────────────────────────────────────────────────

cl_silencer_mode "0"					// Estado por defecto del silenciador (M4A1-S/USP-S) = acoplado
viewmodel_fov "68"					// FOV del arma (max. competitivo)
viewmodel_offset_x "2.5"				// Posicion del arma: adelante/atras
viewmodel_offset_y "0"					// Posicion del arma: izquierda/derecha
viewmodel_offset_z "-1.5"				// Posicion del arma: arriba/abajo
viewmodel_presetpos "2"					// Posicion preestablecida = Classic
cl_prefer_lefthanded "0"				// Arma en mano derecha
r_drawtracers_firstperson "1"				// Mostrar trazadoras de balas en 1ra persona
cl_showloadout "1"					// Mostrar siempre el inventario en pantalla
cl_use_opens_buy_menu "0"				// La tecla "usar" (E) no abre el menu de compra
cl_buywheel_nonumberpurchasing "1"			// Rueda de compra: numeros ignorados, los maneja el juego
cl_buywheel_donate_key "0"				// Tecla de donar en rueda de compra = Ctrl izq.

// ── Radar ───────────────────────────────────────────────────

cl_radar_always_centered "0"				// El radar se desplaza con tu posicion (no centrado fijo)
cl_radar_rotate "1"					// El radar rota segun tu mirada
cl_hud_radar_map_additive "1"				// El mapa del radar se mezcla (blend) con el fondo
cl_hud_radar_blur_background "0"			// Sin desenfoque de fondo en el radar
cl_hud_radar_background_alpha "1"			// Opacidad del fondo del radar = 100%
cl_hud_radar_scale "1.3"				// Tamano del radar en el HUD
cl_radar_scale "0.4"					// Zoom del mapa dentro del radar
cl_radar_scale_alternate "1"				// Escala alternativa (al usar toggleradarscale)
cl_radar_square_with_scoreboard "1"			// Radar cuadrado al ver el marcador
cl_radar_square_always "0"				// Radar cuadrado permanente = NO
cl_radar_scale_dynamic "0"				// Zoom de radar dinamico = NO (zoom fijo)

// ── Crosshair ───────────────────────────────────────────────

cl_crosshairstyle "4"					// Estilo = Classic Static
cl_crosshair_friendly_warning "1"			// Advertencia al apuntar a companeros = siempre activa
cl_crosshair_recoil "0"					// La mira no sigue el recoil visualmente
cl_crosshairdot "0"					// Sin punto central
cl_crosshairsize "2.5"					// Largo de cada linea
cl_crosshairthickness "0.5"				// Grosor de linea
cl_crosshairgap "-8"					// Espacio entre lineas y centro (negativo = mas cerca/solapado)
cl_crosshair_outlinethickness "0"			// Sin contorno
cl_crosshaircolor_r "0"					// Color personalizado: rojo
cl_crosshaircolor_g "255"				// Color personalizado: verde
cl_crosshaircolor_b "0"					// Color personalizado: azul → verde puro
cl_crosshairalpha "255"					// Opacidad = 100% (solido)
cl_crosshair_t "0"					// Estilo "T" (sin linea superior) = NO, cruz completa
cl_crosshairgap_useweaponvalue "0"			// Ignora el gap propio de cada arma, usa el valor fijo de arriba
cl_ironsight_usecrosshaircolor "0"			// El punto de mira al usar scope NO usa el color del crosshair
cl_show_observer_crosshair "0"				// No mostrar el crosshair de otros jugadores al espectar

// ── Miras de sniper ───────────────────────────────────────────

cl_sniper_delay_unscope "0"				// Sin delay al desenfocar mira de sniper
cl_crosshair_sniper_show_normal_inaccuracy "1"		// Mostrar inexactitud (circulo) al usar sniper
cl_sniper_auto_rezoom "1"				// Re-enfocar automaticamente tras disparar
cl_crosshair_sniper_width "1"				// Grosor de la cruz de sniper
cl_ironsight_dot_scale "1"				// Escala del punto de mira al usar scope = 100%

// ── Mira de alineación para granadas ───────────────────────────

cl_grenadecrosshair_keepusercrosshair "1"		// Mantener tu crosshair normal al lanzar granadas
cl_grenadecrosshair_flash "0"				// Sin arco de trayectoria para flashbang
cl_grenadecrosshairdelay_flash "0"			// Delay del arco de flashbang
cl_grenadecrosshair_explosive "0"			// Sin arco de trayectoria para HE
cl_grenadecrosshairdelay_explosive "0"			// Delay del arco de HE
cl_grenadecrosshair_fire "0"				// Sin arco de trayectoria para molotov/incendiaria
cl_grenadecrosshairdelay_fire "0"			// Delay del arco de molotov/incendiaria
cl_grenadecrosshair_smoke "1"				// Mostrar arco de trayectoria para smoke
cl_grenadecrosshairdelay_smoke "1.5"			// Delay antes de mostrar el arco de smoke (segundos)
cl_grenadecrosshair_decoy "0"				// Sin arco de trayectoria para decoy
cl_grenadecrosshairdelay_decoy "0"			// Delay del arco de decoy

// ── Predicción de daño ─────────────────────────────────────────

cl_predict_body_shot_fx "0"				// No predecir efecto visual de impacto en cuerpo
cl_predict_head_shot_fx "0"				// No predecir efecto visual de impacto en cabeza
cl_predict_kill_ragdolls "0"				// No predecir ragdolls al matar (mas consistente con el servidor)

// ── Telemetría ──────────────────────────────────────────────

cl_hud_telemetry_frametime_show "0"			// Grafico de frametime/FPS = nunca
cl_hud_telemetry_frametime_poor "10"			// Umbral (ms) para marcar frametime "malo" (10ms = 100FPS)
cl_hud_telemetry_ping_show "1"				// Mostrar ping = si las condiciones son malas
cl_hud_telemetry_net_misdelivery_show "1"		// Mostrar problemas de red = si las condiciones son malas
cl_hud_telemetry_net_misdelivery_poor "2"		// Umbral de paquetes perdidos para marcar como "malo"
cl_hud_telemetry_net_detailed "0"			// Detalle extendido de red = nunca
cl_hud_telemetry_net_quality_graph_show "0"		// Grafico de calidad de red = nunca

// ╔════════════════════════════════════════════════════════════╗
// ║  TECLADO Y MOUSE                                             ║
// ╚════════════════════════════════════════════════════════════╝
// ── Teclado y configuración de mouse ───────────────────────────

//Reverse mouse comando — OFF (m_pitch positivo arriba ya cumple esto, no se invierte)
option_duck_method "0"					// Duck Mode = Hold (agacharse mientras se mantiene presionado)
option_speed_method "0"					// Walk Mode = Hold (caminar mientras se mantiene presionado)
cl_debounce_zoom "0"					// Zoom Button Hold = Repeat Disabled (sin repeticion al mantener)
sensitivity "0.787"					// Sensibilidad base — multiplicador aplicado a tu eDPI
zoom_sensitivity_ratio "1"				// Multiplicador de sensibilidad al usar mira (scope de snipers)

// ── Teclas de movimiento ───────────────────────────────────

bind " " "show_loadout_toggle" 				// Alterna mostrar/ocultar inventario
bind "w" "+forward"					// Avanzar
bind "s" "+back"					// Retroceder
bind "a" "+left"					// Izquierda
bind "d" "+right"					// Derecha
bind "shift" "+sprint"					// Caminar/correr (Walk)
bind "ctrl" "+duck"					// Agacharse (Duck)
bind "space" "+jump"					// Saltar
bind "mwheeldown" "+jump"				// Saltar
bind "mwheelup" "+jump"					// Saltar

// ── Teclas de armas ───────────────────────────────────

bind "e" "+use"						// Usar — abrir puertas, defusar
bind "mouse1" "+attack"					// Disparar
bind "mouse2" "+attack2"				// Mira/fuego secundario
bind "r" "+reload"					// Recargar
bind " " "+quickinv"					// Menu radial de armas
bind " " "invprev"					// Arma anterior
bind " " "invnext"					// Arma siguiente
bind " " "lastinv"					// Ultima arma usada
bind "g" "drop"						// Soltar arma/bomba
bind "f" "+lookatweapon"				// Inspeccionar arma
bind " " "switchhands"					// Cambiar el arma de mano izq/der
bind "b" "buymenu"					// Menu de compra
bind " " "autobuy"					// Autocomprar
bind " " "rebuy"					// Recomprar equipo anterior
bind "1" "slot1"					// Arma primaria
bind "2" "slot2"					// Arma secundaria
bind "3" "slot3"					// Cuchillo
bind " " "slot4"					// Ciclar granadas
bind "mouse5" "slot5"					// Explosivos y trampas (bomba/zeus)
bind "4" "slot6"					// Granada HE
bind "v" "slot7"					// Flashbang
bind "c" "slot8"					// Smoke
bind "5" "slot9"					// Decoy
bind "x" "slot10"					// Molotov/incendiaria
bind " " "slot11"					// Zeus x27
bind " " "slot12"					// Healthshot
bind " " "slot13"					// Utility items
bind "t" "+spray_menu"					// Rueda de grafitis

// ── Teclas de interfaz ────────────────────────────────────────

bind "tab" "+showscores"				// Marcador
bind " " "+cl_show_team_equipment"			// Mostrar equipo del equipo
bind "q"   "toggleradarscale"				// Zoom del radar
bind " " "callvote"					// Votaciones
bind " " "teammenu"					// Elegir equipo
bind "|" "toggleconsole"				// Consola de desarrollador

// ── Opciones de comunicación ────────────────────────────────────────

bind "n" "player_ping"					// Ping del jugador
bind " " "radio"					// Menu de radio
bind " " "radio1"					// Radio: comandos de equipo
bind " " "radio2"					// Radio: respuestas
bind " " "radio3"					// Radio: reacciones
bind "enter" "messagemode2"				// Chat de equipo
bind " " "messagemode"					// Chat general
bind "mouse4" "+voicerecord"				// Presionar para hablar (microfono)
bind " " "voice_toggle_open_mic"			// Alternar entre mic abierto y push-to-talk
bind " " "clutch_mode_toggle"				// Activar/desactivar modo clutch

// ── Rueda de chat ────────────────────────────────────────

bind " " "+radialradio"					// Rueda de chat rapido 1
bind " " "+radialradio2"				// Rueda de chat rapido 2
bind " " "+radialradio3"				// Rueda de chat rapido 3
